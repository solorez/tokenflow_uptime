  cname: status.tokenflow.link
  # baseUrl: /your-repo-name
  logoUrl: https://raw.githubusercontent.com/upptime/upptime.js.org/master/static/img/icon.svg
  name: Tokenflow Status
  introTitle: "**Tokenflow** Status Page"
  introMessage: Real-time uptime monitoring for [Tokenflow](https://tokenflow.link)
  navbar:
